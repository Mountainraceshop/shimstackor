services:
  - type: web
    name: shimstackor
    env: python
    plan: free
    branch: main
    runtime: python
    pythonVersion: "3.12.9"
    rootDir: shim-flow-simulator
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
